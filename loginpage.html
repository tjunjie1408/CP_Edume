<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Edume</title>
    <link rel="stylesheet" href="CSS/loginpage.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="container">
        <div id="paper-container"></div>
        
        <a href="index.html" class="back-to-home">
            <span class="material-symbols-outlined">arrow_back</span>Back to Home
        </a>

        <div class="form-box">
            <div class="button-box">
                <div id="btn-highlight"></div>
                <button type="button" class="toggle-btn active" onclick="login()">Log In</button>
                <button type="button" class="toggle-btn" onclick="register()">Sign Up</button>
            </div>

            <div class="logo-img">
                <img src="image/Edume.png" alt="logo-img">
            </div>

            <!-- Login Form -->
            <form id="login-form" class="input-group">
                <div class="input-field">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" id="loginEmail"placeholder="Email Id" required>
                </div>

                <div class="input-field">
                    <span class="material-symbols-outlined">password</span>
                    <input type="password" id="loginPassword"placeholder="Password" required>
                </div>
                
                <button type="submit" class="submit-btn">Log In</button>
                <p class="forgot-pass"><a href="#" onclick="forgotPassword(event)">Forgot Password?</a></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="input-group">
                <div class="input-field">
                    <span class="material-symbols-outlined">person</span>
                    <input type="text" id="registerName" placeholder="Username" required>
                </div>
                <div class="input-field">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" id="registerEmail"placeholder="Email Id" required>
                </div>
                <div class="input-field">
                    <span class="material-symbols-outlined">password</span>
                    <input type="password" id="registerPassword"placeholder="Password" required>
                </div>
                <div class="check-box registration-terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the terms & conditions</label>
                </div>
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>

            <!-- Forgot Password - Step 1: Email Verification Form -->
            <form id="forgot-password-email-form" class="input-group">
                <h3 class="forgot-title">Forgot Password</h3>
                <p class="forgot-subtitle">Enter your email to reset your password</p>
                
                <div class="input-field">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" id="forgot-email" placeholder="Email Id" required>
                </div>

                <button type="submit" class="submit-btn">Verify Email</button>
                <p class="back-to-login"><a href="#" onclick="backToLogin(event)">Back to Log In</a></p>
            </form>

            <!-- Forgot Password - Step 2: New Password Form -->
            <form id="forgot-password-reset-form" class="input-group">
                <h3 class="forgot-title">Reset Password</h3>
                <p class="forgot-subtitle" id="email-display"></p>
                
                <div class="input-field">
                    <span class="material-symbols-outlined">password</span>
                    <input type="password" id="new-password" placeholder="New Password" required>
                </div>

                <div class="input-field">
                    <span class="material-symbols-outlined">password</span>
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="submit-btn">Reset Password</button>
                <p class="back-to-login"><a href="#" onclick="backToLogin(event)">Back to Log In</a></p>
            </form>
        </div>

        <!-- Modal for notifications -->
        <div id="notification-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <div class="modal-icon-container">
                    <span class="modal-icon material-symbols-outlined" id="modal-icon">info</span>
                </div>
                <h2 id="modal-title">Message</h2>
                <p id="modal-message">Message</p>
                <button class="modal-btn" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <script src="JS/loginpage.js"></script>
</body>
</html>
