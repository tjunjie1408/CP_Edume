<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome MiladiCode</title>
    <link rel="stylesheet" href="CSS/loginpage.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="container">
        <div id="paper-container"></div>
        
        <a href="index.html" class="back-to-home">
            <span class="material-symbols-outlined">arrow_back</span>Back to Home
        </a>

        <div class="form-box">
            <div class="button-box">
                <div id="btn-highlight"></div>
                <button type="button" class="toggle-btn active" onclick="login()">Log In</button>
                <button type="button" class="toggle-btn" onclick="register()">Sign Up</button>
            </div>

            <div class="logo-img">
                <img src="image/miladicode.png" alt="logo-img">
            </div>

            <form id="login-form" class="input-group">
                <div class="input-field">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" placeholder="Email Id" required>
                </div>

                <div class="input-field">
                    <span class="material-symbols-outlined">password</span>
                    <input type="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="submit-btn">Log In</button>
                <p class="forgot-pass"><a href="#">Forgot Password?</a></p>
            </form>

            <form id="register-form" class="input-group">
                <div class="input-field">
                    <span class="material-symbols-outlined">person</span>
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-field">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" placeholder="Email Id" required>
                </div>
                <div class="input-field">
                    <span class="material-symbols-outlined">password</span>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="check-box registration-terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the terms & conditions</label>
                </div>
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="JS/loginpage.js"></script>
</body>
</html>
